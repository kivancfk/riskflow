name: riskflow
version: '1.0.0'
config-version: 2

profile: riskflow

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: target
clean-targets:
  - target
  - dbt_packages

# Materialization defaults — staging stays as views (cheap),
# marts are tables (queryable + indexable).
models:
  riskflow:
    staging:
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      +tags: ["gold"]
