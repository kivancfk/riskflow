name: 'riskflow'
version: '1.0.0'
config-version: 2

profile: 'riskflow'

model-paths: ["models"]
test-paths: ["tests"]
snapshot-paths: ["snapshots"]
macro-paths: ["macros"]
seed-paths: ["seeds"]
analysis-paths: ["analyses"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

# Schema layout (with the generate_schema_name macro override):
#   target.schema in profiles.yml = dbt_default (catch-all, mostly unused)
#   +schema: dbt_staging  → views land in dbt_staging.*
#   +schema: gold         → tables land in gold.*
#
# Source data lives in staging.silver_transactions (written by Spark)
# and public.pipeline_runs (written by the Airflow record_pipeline_run task).
# These are NOT modified by dbt — only read.

models:
  riskflow:
    staging:
      +materialized: view
      +schema: dbt_staging
    gold:
      +materialized: table
      +schema: gold
