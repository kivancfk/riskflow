# RiskFlow — local development stack (v4)
#
# Changelog v4:
#   - Phase 4: added streaming-producer and streaming-consumer services
#     (kafka-python-based, NOT Spark Structured Streaming — see ADR-006).
# Changelog v3:
#   - Switched Kafka from bitnami/kafka:3.7 (retired) to apache/kafka:4.0.2.
#     Apache publishes official Kafka images since 3.7.0; env vars are
#     mostly the same but lose the "CFG_" prefix (KAFKA_NODE_ID, not
#     KAFKA_CFG_NODE_ID). We rewrote them accordingly.
#   - Pinned all images to specific patch versions so no future tag
#     retirement breaks the build.
# Changelog v2:
#   - Switched Spark from bitnami/spark:3.5 (retired) to apache/spark:3.5.6.

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type":"spark","host":"spark://spark-master","port":7077,"extra":{"deploy-mode":"client"}}'
    AIRFLOW_CONN_POSTGRES_DEFAULT: 'postgresql://riskflow:riskflow@postgres:5432/riskflow'
    AIRFLOW_CONN_KAFKA_DEFAULT: 'kafka://kafka:9092'
    PYTHONPATH: '/opt/airflow:/opt/airflow/transformations'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./spark/jobs:/opt/airflow/spark_jobs
    - ./transformations:/opt/airflow/transformations
    - ./great_expectations:/opt/airflow/great_expectations
    - ./data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
    - ./scripts:/opt/airflow/scripts
    - ./tests:/opt/airflow/tests
    - ./streaming:/opt/airflow/streaming
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------
  # Postgres 16
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16.4
    container_name: riskflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Airflow init — one-shot
  # ---------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: riskflow-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@riskflow.local || true
        echo "Airflow initialized."
    restart: "no"

  # ---------------------------------------------------------------------
  # Airflow webserver + scheduler
  # ---------------------------------------------------------------------
  airflow:
    <<: *airflow-common
    container_name: riskflow-airflow
    command: bash -c "airflow scheduler & airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Spark 3.5.6 — apache official image
  # ---------------------------------------------------------------------
  spark-master:
    image: apache/spark:3.5.6
    container_name: riskflow-spark-master
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
    command: >
      bash -c "/opt/spark/sbin/start-master.sh -h spark-master &&
               tail -f /opt/spark/logs/*master*.out"
    ports:
      - "8081:8080"   # Spark master UI
      - "7077:7077"   # Spark master RPC
    volumes:
      # Same-path mounts required because Spark executors read local file:// paths
      # produced by Airflow SparkSubmitOperator.
      - ./spark/jobs:/opt/airflow/spark_jobs
      - ./transformations:/opt/airflow/transformations
      - ./data:/opt/airflow/data
      # Convenience aliases for manual Spark-container debugging.
      - ./spark/jobs:/opt/spark_jobs
      - ./transformations:/opt/transformations
      - ./data:/opt/data
    restart: unless-stopped

  spark-worker:
    image: apache/spark:3.5.6
    container_name: riskflow-spark-worker
    user: root
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: "2"
    command: >
      bash -c "/opt/spark/sbin/start-worker.sh spark://spark-master:7077 &&
               tail -f /opt/spark/logs/*worker*.out"
    depends_on:
      - spark-master
    volumes:
      # Same-path mounts required because Spark executors read local file:// paths
      # produced by Airflow SparkSubmitOperator.
      - ./spark/jobs:/opt/airflow/spark_jobs
      - ./transformations:/opt/airflow/transformations
      - ./data:/opt/airflow/data
      # Convenience aliases for manual Spark-container debugging.
      - ./spark/jobs:/opt/spark_jobs
      - ./transformations:/opt/transformations
      - ./data:/opt/data
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Kafka 4.0.2 — apache official image, KRaft single-node combined mode
  # ---------------------------------------------------------------------
  # NOTE: Apache's image uses KAFKA_* (no CFG_ prefix), unlike Bitnami.
  kafka:
    image: apache/kafka:4.0.2
    container_name: riskflow-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "29092:29092"
    volumes:
      - kafka-data:/tmp/kraft-combined-logs
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: riskflow-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: riskflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Phase 4: streaming producer
  # Replays silver Parquet to the riskflow.transactions Kafka topic.
  # Long-running. Loops forever. NOT triggered by Airflow.
  # Reuses the airflow image (same build context) so kafka-python and
  # pyarrow come from the same root pyproject.toml.
  # ---------------------------------------------------------------------
  streaming-producer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: riskflow-streaming-producer
    command: ["python", "-m", "streaming.producer"]
    working_dir: /opt/riskflow
    environment:
      PYTHONPATH: /opt/riskflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: riskflow.transactions
      SILVER_PATH: /opt/riskflow/data/silver
      MSG_PER_SEC: "100"
      DEMO_BURST: "true"        # set to "false" to disable burst injection
      BURST_EVERY_N: "500"
    volumes:
      - ./streaming:/opt/riskflow/streaming
      - ./data:/opt/riskflow/data:ro
    depends_on:
      - kafka
    restart: unless-stopped
    stop_grace_period: 15s

  # ---------------------------------------------------------------------
  # Phase 4: streaming consumer
  # Reads riskflow.transactions, applies velocity rule, writes to
  # public.streaming_alerts via idempotent INSERT.
  # ---------------------------------------------------------------------
  streaming-consumer:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: riskflow-streaming-consumer
    command: ["python", "-m", "streaming.consumer"]
    working_dir: /opt/riskflow
    environment:
      PYTHONPATH: /opt/riskflow
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: riskflow.transactions
      KAFKA_GROUP_ID: riskflow-streaming-consumer
      PG_DSN: "host=postgres port=5432 dbname=riskflow user=riskflow password=riskflow"
      VELOCITY_N: "5"
      VELOCITY_K_SECONDS: "60"
      VELOCITY_T_AMOUNT: "100000"
      HISTORY_MAX_PER_CUSTOMER: "100"
    volumes:
      - ./streaming:/opt/riskflow/streaming
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    restart: unless-stopped
    stop_grace_period: 15s

volumes:
  postgres-data:
  kafka-data:

networks:
  default:
    name: riskflow-network
