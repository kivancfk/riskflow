# RiskFlow — local development stack
#
# Services:
#   - postgres        : warehouse for serving + Airflow metadata + dbt + monitoring tables
#   - airflow-init    : one-shot init (DB migrate, create admin user) — exits when done
#   - airflow         : LocalExecutor running scheduler + webserver in one container
#   - spark-master    : standalone Spark master for SparkSubmitOperator targets
#   - spark-worker    : single Spark worker (more workers can be added by scaling this service)
#   - kafka           : Kafka in KRaft mode (no Zookeeper)
#   - kafka-ui        : optional web UI for inspecting topics
#
# Quick start:
#   docker compose up airflow-init    # one-time DB setup
#   docker compose up -d               # start everything
#   docker compose logs -f airflow     # tail Airflow logs
#
# UIs:
#   - Airflow:    http://localhost:8080   (admin / admin)
#   - Spark:      http://localhost:8081
#   - Kafka UI:   http://localhost:8090

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: airflow/Dockerfile
  environment: &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: ''
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__API__AUTH_BACKENDS: 'airflow.api.auth.backend.basic_auth'
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: 'true'
    # connections (resolved by Airflow at runtime, no need to seed)
    AIRFLOW_CONN_SPARK_DEFAULT: 'spark://spark-master:7077?deploy-mode=client'
    AIRFLOW_CONN_POSTGRES_DEFAULT: 'postgresql://riskflow:riskflow@postgres:5432/riskflow'
    AIRFLOW_CONN_KAFKA_DEFAULT: 'kafka://kafka:9092'
    # Make Airflow worker write Spark logs where the host can see them
    PYTHONPATH: '/opt/airflow:/opt/airflow/transformations'
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
    - ./spark/jobs:/opt/airflow/spark_jobs
    - ./transformations:/opt/airflow/transformations
    - ./great_expectations:/opt/airflow/great_expectations
    - ./data:/opt/airflow/data
    - ./dbt:/opt/airflow/dbt
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on: &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:

  # ---------------------------------------------------------------------
  # Postgres — used by Airflow metadata, dbt warehouse, and our tables
  # ---------------------------------------------------------------------
  postgres:
    image: postgres:16
    container_name: riskflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Airflow init — runs once, creates the admin user and migrates the DB
  # ---------------------------------------------------------------------
  airflow-init:
    <<: *airflow-common
    container_name: riskflow-airflow-init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username admin --password admin \
          --firstname Admin --lastname User \
          --role Admin --email admin@riskflow.local || true
        echo "Airflow initialized."
    restart: "no"

  # ---------------------------------------------------------------------
  # Airflow — LocalExecutor, single container running scheduler + webserver
  # ---------------------------------------------------------------------
  airflow:
    <<: *airflow-common
    container_name: riskflow-airflow
    command: bash -c "airflow scheduler & airflow webserver"
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Spark — standalone master + one worker
  # ---------------------------------------------------------------------
  spark-master:
    image: bitnami/spark:3.5
    container_name: riskflow-spark-master
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    ports:
      - "8081:8080"   # Spark master UI
      - "7077:7077"   # Spark master RPC
    volumes:
      - ./spark/jobs:/opt/spark_jobs
      - ./transformations:/opt/transformations
      - ./data:/opt/data
    restart: unless-stopped

  spark-worker:
    image: bitnami/spark:3.5
    container_name: riskflow-spark-worker
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
    depends_on:
      - spark-master
    volumes:
      - ./spark/jobs:/opt/spark_jobs
      - ./transformations:/opt/transformations
      - ./data:/opt/data
    restart: unless-stopped

  # ---------------------------------------------------------------------
  # Kafka — KRaft mode (no Zookeeper required since Kafka 3.3+)
  # ---------------------------------------------------------------------
  kafka:
    image: bitnami/kafka:3.7
    container_name: riskflow-kafka
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "29092:29092"   # external (host) listener
    volumes:
      - kafka-data:/bitnami/kafka
    restart: unless-stopped

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: riskflow-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: riskflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8090:8080"
    depends_on:
      - kafka
    restart: unless-stopped

volumes:
  postgres-data:
  kafka-data:

networks:
  default:
    name: riskflow-network
